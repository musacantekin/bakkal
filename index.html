<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can Bakkal Dijital Katalog</title>
    <!-- Daha stabil çalışan Tailwind altyapısı -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }</style>
</head>
<body class="bg-slate-50 pb-10">

    <!-- Üst Başlık -->
    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white text-center py-6 px-4 shadow-md sticky top-0 z-50">
        <h1 class="text-2xl font-bold tracking-wide">CAN BAKKAL</h1>
        <p class="text-xs opacity-90 mt-1">Güncel Fiyat Listesi</p>
    </div>

    <!-- Arama Çubuğu -->
    <div class="p-4 max-w-md mx-auto">
        <div class="relative">
            <input type="text" id="searchBar" onkeyup="filterProducts()" placeholder="Ürün ara..." class="w-full bg-white pl-10 pr-4 py-3 rounded-xl border border-slate-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-4 text-slate-400 text-sm"></i>
        </div>
    </div>

    <!-- Ürünlerin Geleceği Grid Alanı -->
    <div class="px-4 max-w-md mx-auto grid grid-cols-2 gap-4" id="productGrid">
        <p class="col-span-2 text-center text-slate-500 mt-4 text-sm" id="loadingText"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Liste yükleniyor...</p>
    </div>

    <script>
        async function exceldenOku() {
            try {
                // Yüklediğin urunler.csv dosyasını otomatik bulur
                const response = await fetch('urunler.csv');
                if (!response.ok) throw new Error("Dosya bulunamadı");
                const data = await response.text();
                
                const grid = document.getElementById('productGrid');
                document.getElementById('loadingText').style.display = 'none';
                
                const satirlar = data.split('\n').slice(1); 
                
                satirlar.forEach(satir => {
                    if (!satir.trim()) return; 
                    
                    // Türkçe Excel CSV'yi noktalı virgülle kaydeder, kodun her ikisini de anlaması için:
                    const ayirici = satir.includes(';') ? ';' : ',';
                    const sutunlar = satir.split(ayirici);
                    
                    const urunAdi = sutunlar[0] ? sutunlar[0].replace(/"/g, '').trim() : '';
                    const fiyat = sutunlar[1] ? sutunlar[1].replace(/"/g, '').trim() : '';
                    const resim = sutunlar[2] ? sutunlar[2].replace(/"/g, '').trim() : 'https://via.placeholder.com/150?text=Resim+Yok';

                    if (!urunAdi) return; // Boş satırları atla

                    const kart = `
                        <div class="product-card bg-white p-3 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between transition transform active:scale-95">
                            <div class="w-full h-32 bg-slate-50 rounded-xl overflow-hidden flex items-center justify-center p-2">
                                <img src="${resim}" alt="${urunAdi}" class="max-h-full max-w-full object-contain">
                            </div>
                            <div class="mt-3">
                                <h3 class="text-sm font-semibold text-slate-800 line-clamp-2 min-h-[40px]">${urunAdi}</h3>
                                <div class="mt-2 flex items-center justify-between">
                                    <span class="text-xs text-slate-400">1 Adet</span>
                                    <span class="text-base font-bold text-blue-600">${fiyat}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += kart;
                });
            } catch (error) {
                document.getElementById('loadingText').innerText = "urunler.csv dosyası henüz yüklenmedi veya okunurken hata oluştu.";
            }
        }

        // Arama fonksiyonu
        function filterProducts() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('product-card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
                cards[i].style.display = title.includes(input) ? "" : "none";
            }
        }

        exceldenOku();
    </script>
</body>
</html>
