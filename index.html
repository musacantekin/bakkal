<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can Bakkal Dijital Katalog</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="pb-10">

    <!-- Üst Başlık -->
    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white text-center py-6 px-4 shadow-md sticky top-0 z-50">
        <h1 class="text-2xl font-bold tracking-wide">CAN BAKKAL</h1>
        <p class="text-xs opacity-90 mt-1">Güncel Fiyat Listesi</p>
    </div>

    <!-- Arama Çubuğu -->
    <div class="p-4 max-w-md mx-auto">
        <div class="relative">
            <input type="text" id="searchBar" onkeyup="filterProducts()" placeholder="Ürün ara..." class="w-full bg-white pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
            <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3.5 text-slate-400 text-sm"></i>
        </div>
    </div>

    <!-- Ürünlerin Geleceği Grid Alanı -->
    <div class="px-4 max-w-md mx-auto grid grid-cols-2 gap-4" id="productGrid">
        <p class="col-span-2 text-center text-slate-500 mt-4 text-sm" id="loadingText"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Ürünler güncelleniyor...</p>
    </div>

    <script>
        // KOPYALADIĞIN GOOGLE TABLO LİNKİNİ AŞAĞIDAKİ TIRNAKLARIN İÇİNE YAPIŞTIR
       
       const TSV_LINK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTuPtmBjJf7YTlZEsRG3Fq6tdbDs7xOlNG56mDuLSTY7_4X-mKM793u9z4U3699MENfHnsNM_vLT02T/pub?output=tsv";

        async function urunleriGetir() {
            try {
                const response = await fetch(TSV_LINK);
                const data = await response.text();
                
                const grid = document.getElementById('productGrid');
                document.getElementById('loadingText').style.display = 'none';
                
                // Tablodaki satırları ayırma işlemi
                const satirlar = data.split('\n').slice(1); 
                
                satirlar.forEach(satir => {
                    if (!satir.trim()) return; // Boş satır varsa atla
                    const sutunlar = satir.split('\t');
                    
                    const urunAdi = sutunlar[0] ? sutunlar[0].replace(/"/g, '').trim() : 'İsimsiz Ürün';
                    const fiyat = sutunlar[1] ? sutunlar[1].replace(/"/g, '').trim() : 'Fiyat Yok';
                    const resim = sutunlar[2] ? sutunlar[2].replace(/"/g, '').trim() : 'https://via.placeholder.com/150?text=Resim+Yok';

                    const kart = `
                        <div class="product-card bg-white p-3 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between transition transform active:scale-95">
                            <div class="w-full h-32 bg-slate-50 rounded-xl overflow-hidden flex items-center justify-center p-2">
                                <img src="${resim}" alt="${urunAdi}" class="max-h-full max-w-full object-contain">
                            </div>
                            <div class="mt-3">
                                <h3 class="text-sm font-semibold text-slate-800 line-clamp-2 min-h-[40px]">${urunAdi}</h3>
                                <div class="mt-2 flex items-center justify-end">
                                    <span class="text-base font-bold text-blue-600">${fiyat} TL</span>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += kart;
                });
            } catch (error) {
                document.getElementById('loadingText').innerText = "Ürünler yüklenirken bağlantı hatası oluştu.";
                document.getElementById('loadingText').style.display = 'block';
            }
        }

        // Arama fonksiyonu
        function filterProducts() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('product-card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
                cards[i].style.display = title.includes(input) ? "" : "none";
            }
        }

        // Sayfa yüklendiğinde tetikle
        if(TSV_LINK !== "BURAYA_LINKI_YAPISTIR") {
            urunleriGetir();
        } else {
            document.getElementById('loadingText').innerText = "Lütfen koddaki TSV_LINK kısmına kendi Google Tablo linkinizi yapıştırın.";
        }
    </script>
</body>
</html>
